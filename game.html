<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NEON DRIFT — Drive</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#07070f; font-family:'Segoe UI',system-ui,sans-serif; touch-action:none; }
  canvas.game { position:absolute; inset:0; display:block; }
  .hidden { display:none !important; }

  #loading { position:absolute; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:#07070f; color:#8fa8cc; gap:18px; }
  .spin { width:46px; height:46px; border-radius:50%; border:4px solid rgba(255,255,255,.12);
    border-top-color:#00e5ff; animation:sp 1s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }

  /* ---------- GARAGE ---------- */
  #garage { position:absolute; inset:0; z-index:10; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:max(16px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
    transition:opacity .5s; }
  #garage.off { opacity:0; }
  #garage > * { pointer-events:auto; }
  .g-top { display:flex; justify-content:space-between; align-items:center; color:#8fa8cc; font-size:.85rem; }
  .g-top a { color:#8fa8cc; text-decoration:none; }
  .g-title { text-align:center; }
  .g-title h2 { font-size:clamp(1.5rem,6vw,2.3rem); font-weight:900; font-style:italic; letter-spacing:3px;
    background:linear-gradient(90deg,#00e5ff,#ff2d78); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .g-title small { color:#8fa8cc; letter-spacing:3px; font-size:.68rem; }
  .g-bottom { display:flex; flex-direction:column; gap:12px; align-items:center; }
  .maps { display:flex; gap:10px; }
  .mapbtn { padding:9px 16px; border-radius:12px; border:1.5px solid rgba(255,255,255,.22);
    background:rgba(255,255,255,.06); color:#cfe0f5; font-size:.78rem; letter-spacing:1px;
    cursor:pointer; backdrop-filter:blur(6px); }
  .mapbtn.sel { border-color:#00e5ff; color:#fff; background:rgba(0,229,255,.18);
    box-shadow:0 0 14px rgba(0,229,255,.35); }
  #wallet { color:#ffd23f; font-weight:800; font-style:italic; font-size:1.05rem; letter-spacing:1px; }
  .upgrades { display:flex; flex-direction:column; gap:8px; width:min(92vw,420px); }
  .upg { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15); border-radius:12px; padding:9px 12px; backdrop-filter:blur(6px); }
  .upg .nm { flex:1; text-align:left; font-size:.8rem; letter-spacing:1px; color:#cfe0f5; font-weight:700; }
  .upg .nm small { display:block; color:#5d7291; font-weight:400; font-size:.62rem; letter-spacing:.5px; }
  .pips { display:flex; gap:3px; }
  .pip { width:9px; height:14px; border-radius:3px; background:rgba(255,255,255,.14); }
  .pip.on { background:linear-gradient(#00e5ff,#a855f7); box-shadow:0 0 6px rgba(0,229,255,.6); }
  .buy { border:none; border-radius:9px; padding:8px 12px; font-weight:800; font-size:.72rem;
    letter-spacing:1px; cursor:pointer; color:#05060f; min-width:74px;
    background:linear-gradient(90deg,#ffd23f,#ff9e2d); }
  .buy:disabled { background:rgba(255,255,255,.12); color:#5d7291; cursor:default; }
  .paints { display:flex; gap:12px; }
  .chip { width:36px; height:36px; border-radius:50%; border:2.5px solid rgba(255,255,255,.35); cursor:pointer; }
  .chip.sel { border-color:#fff; box-shadow:0 0 14px currentColor; transform:scale(1.12); }
  .drive { font-size:1.25rem; font-weight:900; font-style:italic; letter-spacing:3px;
    padding:16px 60px; border:none; border-radius:60px; cursor:pointer; color:#05060f;
    background:linear-gradient(90deg,#00e5ff,#a855f7); box-shadow:0 10px 40px rgba(0,229,255,.4);
    transition:transform .12s; }
  .drive:active { transform:scale(.93); }
  .hint { color:#5d7291; font-size:.7rem; letter-spacing:1px; text-align:center; }

  /* ---------- HUD ---------- */
  #hud { position:absolute; inset:0; z-index:10; pointer-events:none;
    padding:max(12px,env(safe-area-inset-top)) 16px; color:#fff; }
  .scorebox { text-align:center; }
  #banked { font-size:1rem; font-weight:700; text-shadow:0 1px 6px #000; }
  #pending { font-size:clamp(1.5rem,6vw,2.3rem); font-weight:900; font-style:italic;
    color:#ffd23f; text-shadow:0 0 18px rgba(255,210,63,.65); min-height:1.15em; line-height:1.15; }
  #driftlbl { color:#ff9e2d; letter-spacing:5px; font-size:.72rem; font-weight:700; min-height:1.1em; }
  #speedo { position:absolute; right:18px; bottom:calc(max(18px,env(safe-area-inset-bottom)) + 104px); text-align:right; }
  #speedo .n { font-size:clamp(2.2rem,8vw,3.4rem); font-weight:900; font-style:italic; line-height:1;
    text-shadow:0 0 22px rgba(0,229,255,.6); }
  #speedo .u { color:#8fa8cc; font-size:.65rem; letter-spacing:3px; }
  #minimap { position:absolute; left:16px; top:max(12px,env(safe-area-inset-top));
    width:104px; height:104px; border-radius:12px; border:1px solid rgba(255,255,255,.25);
    background:rgba(5,6,15,.55); }
  #pause { position:absolute; right:16px; top:max(12px,env(safe-area-inset-top)); pointer-events:auto;
    width:42px; height:42px; border-radius:10px; font-size:1rem; cursor:pointer;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22); color:#fff; }

  .ctl { position:absolute; bottom:max(16px,env(safe-area-inset-bottom)); display:flex; gap:12px;
    pointer-events:auto; user-select:none; -webkit-user-select:none; z-index:11; }
  #ctlL { left:16px; } #ctlR { right:16px; }
  .pad { width:clamp(60px,15vw,84px); height:clamp(60px,15vw,84px); border-radius:20px;
    background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.22); color:#fff;
    font-size:1.5rem; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
  .pad.active { background:rgba(0,229,255,.4); border-color:#00e5ff; }
  .pad.hb { border-color:rgba(255,158,45,.6); color:#ff9e2d; font-size:.75rem; font-weight:800; letter-spacing:1px; }
  .pad.hb.active { background:rgba(255,158,45,.4); }
  .pad.nitro { border-color:rgba(168,85,247,.65); color:#c98aff; font-size:.9rem; font-weight:800; }
  .pad.nitro.active { background:rgba(168,85,247,.45); }
  .nbar { width:120px; height:7px; background:rgba(255,255,255,.12); border-radius:4px;
    margin-top:7px; margin-left:auto; overflow:hidden; }
  #nitroFill { height:100%; width:0%; border-radius:4px;
    background:linear-gradient(90deg,#a855f7,#00e5ff); transition:width .12s linear; }
  #mission { position:absolute; left:16px; top:calc(max(12px,env(safe-area-inset-top)) + 112px);
    max-width:180px; background:rgba(5,6,15,.55); border:1px solid rgba(255,255,255,.2);
    border-radius:10px; padding:8px 11px; font-size:.68rem; line-height:1.5; color:#cfe0f5; }
  #mission b { color:#ffd23f; display:block; font-size:.6rem; letter-spacing:2px; }
  #mission .done { color:#7cfc9a; font-weight:800; }
  @media (hover:hover) and (pointer:fine) { .ctl { opacity:.3; } }
</style>
</head>

<div id="garage" class="hidden">
  <div class="g-top"><a href="index.html">◀ HOME</a><span id="wallet">¤ 0</span>
    <button class="mapbtn" id="fxBtn" style="padding:6px 10px;font-size:.65rem">FX ✦</button>
    <span>BEST <b id="gBest" style="color:#ffd23f">0</b></span></div>

      <button class="drive" id="driveBtn">▶ &nbsp;DRIVE</button>

  </div>
</div>

<div id="hud" class="hidden">
  <div class="scorebox">
    <div id="banked">SCORE 0</div>
    <div id="pending"></div>
    <div id="driftlbl"></div>
  </div>
  <canvas id="minimap" width="208" height="208"></canvas>
  <button id="pause">| |</button>
  <div id="speedo"><div class="n" id="speedN">0</div><div class="u"><span id="gearN" style="color:#00e5ff;font-weight:800">N</span> · KM/H</div>
    <div class="nbar"><div id="nitroFill"></div></div></div>
  <div id="mission"><b>MISSION</b><span id="missionTxt">…</span></div>
  <div id="race" class="hidden" style="position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 46px);left:0;right:0;text-align:center;font-weight:800;font-style:italic;color:#ffd23f;text-shadow:0 0 14px rgba(255,210,63,.6);font-size:1.1rem"></div>
  <div id="police" class="hidden" style="position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 76px);left:0;right:0;text-align:center;font-weight:800;font-style:italic;color:#4488ff;text-shadow:0 0 14px rgba(68,136,255,.7);font-size:1rem"></div>
  <div class="ctl" id="ctlL">
    <div class="pad" data-k="left">◀</div><div class="pad" data-k="right">▶</div>

  </div>

    <div class="pad hb" data-k="uturn" style="font-size:.68rem">⟲ U-TURN</div>

<script type="importmap">
{ "imports": {
  "three": "./lib/three.module.js",
  "three/addons/environments/RoomEnvironment.js": "./lib/RoomEnvironment.js",
  "three/addons/": "./lib/addons/"
} }
</script>
<script type="module">
import * as THREE from "three";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const $ = id => document.getElementById(id);

/* ================= MAPS ================= */
const MAPS = [
  { key:"neon",  name:"NEON CITY",
    skyTop:[.012,.008,.05], skyMid:[.16,.05,.24], skyLow:[.85,.28,.22],
    fog:0x0a0718, fogD:.0075, hemi:[0x4a5aff,0x1a0c22,.55],
    sunC:0x9fb0ff, sunI:.9, ground:"#100a18", groundDot:[10,22],
    bDensity:6, bHmin:10, bHmax:52, lampC:0xffd9a0, hues:[230,265,195,320,180],
    litRatio:.32, traffic:10, parked:26, rain:true, wet:true },
  { key:"sunset", name:"SUNSET STRIP",
    skyTop:[.05,.02,.14], skyMid:[.55,.16,.30], skyLow:[1.0,.55,.15],
    fog:0x2a1020, fogD:.0058, hemi:[0xff9a66,0x2a1428,.7],
    sunC:0xffb066, sunI:1.5, ground:"#1c1210", groundDot:[16,30],
    bDensity:3, bHmin:6, bHmax:22, lampC:0xffe6c0, hues:[20,35,340,300,210],
    litRatio:.18, traffic:7, parked:16 },
  { key:"harbor", name:"FOG HARBOR",
    skyTop:[.05,.08,.11], skyMid:[.15,.21,.26], skyLow:[.38,.48,.52],
    fog:0x1c262e, fogD:.010, hemi:[0x5a7a8a,0x0c1418,.6],
    sunC:0xaaccdd, sunI:.7, ground:"#0c1216", groundDot:[12,26],
    bDensity:4, bHmin:6, bHmax:16, lampC:0xcfe8ff, hues:[200,190,210,180,220],
    litRatio:.22, traffic:6, parked:34, rain:true, wet:true },
];
let mapIdx = Math.min(+(localStorage.ndMap||0), MAPS.length-1);

/* ================= RENDERER ================= */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.6));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.domElement.classList.add("game");
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), .06).texture;

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 700);

/* ---- post-processing: bloom + cinematic vignette/chromatic aberration ---- */
let fxOn=localStorage.ndFx!=="off";
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), .75, .55, .72);
composer.addPass(bloom);
const CinePass=new ShaderPass({
  uniforms:{ tDiffuse:{value:null}, uBlur:{value:0}, uTime:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform sampler2D tDiffuse; uniform float uBlur,uTime; varying vec2 vUv;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    void main(){
      vec2 d=vUv-.5;
      float r2=dot(d,d);
      // radial motion blur: streaks outward with speed (UE5-style speed feel)
      vec3 c=vec3(0.); float tw=0.;
      for (int i=0;i<4;i++){
        float t=float(i)/3.;
        vec2 uv=vUv-d*r2*uBlur*t;
        float w=1.-t*.5; tw+=w;
        c+=texture2D(tDiffuse,uv).rgb*w;
      }
      c/=tw;
      // chromatic aberration at edges
      vec2 off=d*r2*.06;
      c.r=texture2D(tDiffuse,vUv+off).r*.5+c.r*.5;
      c.b=texture2D(tDiffuse,vUv-off).b*.5+c.b*.5;
      // cinematic teal-orange grade
      float lum=dot(c,vec3(.299,.587,.114));
      c=mix(c,c*vec3(1.06,1.0,.94),smoothstep(.4,1.,lum));   // warm highlights
      c=mix(c,c*vec3(.92,1.0,1.1),smoothstep(.5,0.,lum));    // teal shadows
      // film grain
      c+=(hash(vUv*vec2(1920.,1080.)+uTime)-.5)*.035;
      c*=1.-r2*.85;                                          // vignette
      gl_FragColor=vec4(c,1.);
    }`
});
composer.addPass(CinePass);
composer.addPass(new OutputPass());
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, .5)); // replaced per-map
const hemi = scene.children[scene.children.length-1];
const moonLight = new THREE.DirectionalLight(0xffffff, 1);
moonLight.position.set(-60, 90, -40);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(1536, 1536);
moonLight.shadow.camera.left=-50; moonLight.shadow.camera.right=50;
moonLight.shadow.camera.top=50; moonLight.shadow.camera.bottom=-50;
moonLight.shadow.camera.far=300; moonLight.shadow.bias=-.0006;
scene.add(moonLight, moonLight.target);

/* ================= TEXTURE HELPERS ================= */
function canvasTex(w,h,draw,rx=1,ry=1){
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  draw(c.getContext("2d"),w,h);
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(rx,ry); t.anisotropy=4;
  return t;
}
const asphaltTex = canvasTex(256,256,(x,w,h)=>{
  x.fillStyle="#17171f"; x.fillRect(0,0,w,h);
  for (let i=0;i<5200;i++){ const v=18+Math.random()*36|0;
    x.fillStyle=`rgb(${v},${v},${v+6})`; x.fillRect(Math.random()*w,Math.random()*h,1.6,1.6); }
  x.strokeStyle="rgba(0,0,0,.5)"; x.lineWidth=1;
  for (let i=0;i<7;i++){ x.beginPath();
    let px=Math.random()*w, py=Math.random()*h; x.moveTo(px,py);
    for (let k=0;k<5;k++){ px+=(Math.random()-.5)*60; py+=(Math.random()-.5)*60; x.lineTo(px,py); }
    x.stroke(); }
},3,12);
const sidewalkTex = canvasTex(128,128,(x,w,h)=>{
  x.fillStyle="#26262f"; x.fillRect(0,0,w,h);
  x.strokeStyle="rgba(0,0,0,.6)"; x.lineWidth=2;
  for (let i=0;i<=w;i+=32){ x.beginPath(); x.moveTo(i,0); x.lineTo(i,h); x.stroke(); }
  for (let i=0;i<1200;i++){ const v=30+Math.random()*18|0;
    x.fillStyle=`rgb(${v},${v},${v+4})`; x.fillRect(Math.random()*w,Math.random()*h,1.4,1.4); }
},40,2);
function groundTexFor(cfg){
  return canvasTex(256,256,(x,w,h)=>{
    x.fillStyle=cfg.ground; x.fillRect(0,0,w,h);
    for (let i=0;i<3000;i++){ const v=cfg.groundDot[0]+Math.random()*(cfg.groundDot[1]-cfg.groundDot[0])|0;
      x.fillStyle=`rgb(${v+4},${v},${v+8})`; x.fillRect(Math.random()*w,Math.random()*h,2.2,2.2); }
  },40,40);
}
function facadeTex(hue, litRatio){
  return canvasTex(128,256,(x,w,h)=>{
    x.fillStyle=`hsl(${hue},30%,9%)`; x.fillRect(0,0,w,h);
    for (let r=6;r<h-8;r+=18) for (let c2=8;c2<w-8;c2+=16){
      const lit=Math.random()<litRatio;
      x.fillStyle = lit ? `hsl(${40+Math.random()*20},90%,${55+Math.random()*20}%)`
                        : `hsl(${hue},25%,${4+Math.random()*5}%)`;
      x.fillRect(c2,r,9,11);
    }
  });
}
function billboardTex(txt, col){
  return canvasTex(256,128,(x,w,h)=>{
    x.fillStyle="#0a0a14"; x.fillRect(0,0,w,h);
    x.strokeStyle=col; x.lineWidth=6; x.strokeRect(6,6,w-12,h-12);
    x.fillStyle=col; x.font="900 italic 44px sans-serif";
    x.textAlign="center"; x.textBaseline="middle";
    x.shadowColor=col; x.shadowBlur=18;
    x.fillText(txt,w/2,h/2);
  });
}
const glowTex = canvasTex(128,128,(x,w,h)=>{
  const g=x.createRadialGradient(64,64,6,64,64,62);
  g.addColorStop(0,"rgba(255,255,255,.55)"); g.addColorStop(1,"rgba(255,255,255,0)");
  x.fillStyle=g; x.fillRect(0,0,w,h);
});
const smokeTex = canvasTex(64,64,(x,w,h)=>{
  const g=x.createRadialGradient(32,32,3,32,32,30);
  g.addColorStop(0,"rgba(255,255,255,.9)"); g.addColorStop(1,"rgba(255,255,255,0)");
  x.fillStyle=g; x.fillRect(0,0,64,64);
});

/* ================= WORLD (rebuilt per map) ================= */
const WORLD=380, GRID=60, ROAD_HALF=7;
let world=null, buildings=[], coins=[], traffic=[], skyMesh=null;

function disposeGroup(g){
  g.traverse(o=>{
    if (o.geometry) o.geometry.dispose();
    if (o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{
      if (m.map) m.map.dispose(); m.dispose(); }); }
  });
  scene.remove(g);
}

function buildWorld(cfg){
  if (world) disposeGroup(world);
  world = new THREE.Group(); buildings=[]; coins=[]; traffic=[];
  const rng=(a,b)=>a+Math.random()*(b-a);

  scene.fog = new THREE.FogExp2(cfg.fog, cfg.fogD);
  hemi.color.setHex(cfg.hemi[0]); hemi.groundColor.setHex(cfg.hemi[1]); hemi.intensity=cfg.hemi[2];
  moonLight.color.setHex(cfg.sunC); moonLight.intensity=cfg.sunI;

  // ---- sky dome + stars + moon ----
  const sky = new THREE.Mesh(new THREE.SphereGeometry(600,24,12),
    new THREE.ShaderMaterial({ side:THREE.BackSide,
      uniforms:{ top:{value:new THREE.Vector3(...cfg.skyTop)},
                 mid:{value:new THREE.Vector3(...cfg.skyMid)},
                 low:{value:new THREE.Vector3(...cfg.skyLow)} },
      vertexShader:`varying vec3 vP; void main(){ vP=position;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vP; uniform vec3 top,mid,low;
        void main(){ float h=normalize(vP).y;
          vec3 c = h>.12 ? mix(mid,top,smoothstep(.12,.6,h))
                         : mix(low,mid,smoothstep(-.04,.12,h));
          gl_FragColor=vec4(c,1.);}` }));
  world.add(sky); skyMesh=sky;
  const pts=[];
  for (let i=0;i<700;i++){ const a=Math.random()*6.283,e=.18+Math.random()*1.3;
    pts.push(Math.cos(a)*Math.cos(e)*560, Math.sin(e)*560, Math.sin(a)*Math.cos(e)*560); }
  const sg=new THREE.BufferGeometry();

function profileGeo(pts, width, bevel){
  const sh=new THREE.Shape();
  sh.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++){
    // smooth the top edges with quadratic blends between points
    const [x,y]=pts[i], [px,py]=pts[i-1];
    sh.quadraticCurveTo(px+(x-px)*.5, Math.max(py,y), x, y);
  }
  sh.closePath();
  const g=new THREE.ExtrudeGeometry(sh,{ depth:width, bevelEnabled:true,
    bevelThickness:bevel, bevelSize:bevel, bevelSegments:2, curveSegments:6 });
  g.translate(0,0,-width/2);
  g.rotateY(-Math.PI/2);   // profile length axis -> local z
  return g;
}

function buildPlayerCar(){
  // clear previous model
  while (car.children.length){
    const c=car.children.pop();
    c.traverse?.(o=>{ if(o.geometry) o.geometry.dispose(); });
  }
  const spec=CARS[carIdx];
  const shell=new THREE.Group(); shell.rotation.y=Math.PI; car.add(shell);
  const add=(mesh,x=0,y=0,z=0,shadow=true)=>{ mesh.position.set(x,y,z);
    mesh.castShadow=shadow; shell.add(mesh); return mesh; };

  // body + glass canopy from smooth extruded profiles
  add(new THREE.Mesh(profileGeo(spec.body, spec.w*.86, .07), paintMat));
  add(new THREE.Mesh(profileGeo(spec.glass, spec.w*.7, .02), glassMat), 0, -.05, 0, false);
  // mirrors + wheel arches
  for (const s of [-1,1]){
    add(new THREE.Mesh(new THREE.BoxGeometry(.26,.1,.14), paintMat),
      s*(spec.w/2+.14), spec.glass[0][1]+.18, spec.glass[0][0], false);
    for (const z of [-1.5,1.5]){
      const arch=new THREE.Mesh(new THREE.TorusGeometry(spec.wheelR+.12,.07,6,10,Math.PI), darkMat);
      arch.rotation.y=Math.PI/2;
      arch.position.set(s*(spec.w/2-.02), spec.wheelR, z);
      shell.add(arch);
    }
  }
  // side skirts + front splitter
  for (const s of [-1,1])
    add(new THREE.Mesh(new THREE.BoxGeometry(.1,.16,3.4), darkMat), s*(spec.w/2-.02), .26, 0, false);
  add(new THREE.Mesh(new THREE.BoxGeometry(spec.w*.92,.08,.5), darkMat), 0, .22, -2.25, false);
  // wing options
  if (spec.wing==="big"){
    add(new THREE.Mesh(new THREE.BoxGeometry(spec.w,.07,.46), paintMat), 0, spec.body[7][1]+.42, 2.05);
    for (const s of [-1,1])
      add(new THREE.Mesh(new THREE.BoxGeometry(.09,.42,.3), darkMat), s*(spec.w/2-.25), spec.body[7][1]+.2, 2.05, false);
  } else if (spec.wing==="lip"){
    add(new THREE.Mesh(new THREE.BoxGeometry(spec.w*.9,.06,.3), paintMat), 0, spec.body[7][1]+.1, 2.2, false);
  }
  if (spec.scoop)
    add(new THREE.Mesh(new THREE.BoxGeometry(.7,.18,.9), darkMat), 0, spec.body[3][1]+.08, -1.3, false);
  // exhausts
  const exG=new THREE.CylinderGeometry(.07,.08,.3,8);
  for (let i=0;i<spec.exhausts;i++){
    const ex=spec.exhausts===1 ? .55 : (i-(spec.exhausts-1)/2)*.9;
    const e=add(new THREE.Mesh(exG, rimMat), ex, .32, 2.45, false);
    e.rotation.x=Math.PI/2;
  }
  // wheels: tire + rim + spokes
  const tireG=new THREE.CylinderGeometry(spec.wheelR,spec.wheelR,.36,18);
  const rimG=new THREE.CylinderGeometry(spec.wheelR*.62,spec.wheelR*.62,.37,12);
  const spokeG=new THREE.BoxGeometry(.05,spec.wheelR*1.1,.06);
  car.userData.wheels=[];
  const axleZ=[-1.5,1.5];
  for (const z of axleZ) for (const s of [-1,1]){
    const w=new THREE.Group();
    const t=new THREE.Mesh(tireG,darkMat); t.rotation.z=Math.PI/2; t.castShadow=true;
    const r=new THREE.Mesh(rimG,rimMat); r.rotation.z=Math.PI/2;
    w.add(t,r);
    for (let k=0;k<5;k++){
      const sp=new THREE.Mesh(spokeG,darkMat);
      sp.rotation.z=Math.PI/2; sp.rotation.x=k*Math.PI*2/5;

function dropSkid(x,z,yaw){
  const m=new THREE.Matrix4().makeRotationY(yaw)
    .multiply(new THREE.Matrix4().makeRotationX(-Math.PI/2));
  for (const s of [-.95,.95]){
    const off=new THREE.Vector3(s,0,-1.45).applyAxisAngle(new THREE.Vector3(0,1,0),yaw);
    m.setPosition(x+off.x,.045+(skidHead%9)*.0004,z+off.z);
    skids.setMatrixAt(skidHead++%SKID_N,m);
  }

const Audio2={
  ctx:null,
  init(){
    if (this.ctx) return;
    const C=window.AudioContext||window.webkitAudioContext;
    this.ctx=new C();
    const master=this.ctx.createGain(); master.gain.value=.5; master.connect(this.ctx.destination);
    this.master=master;
    const eg=this.ctx.createGain(); eg.gain.value=0;
    const lp=this.ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=420;
    eg.connect(lp); lp.connect(master);
    this.engineOsc=[0,6].map(d=>{ const o=this.ctx.createOscillator();
      o.type="sawtooth"; o.frequency.value=50; o.detune.value=d; o.connect(eg); o.start(); return o; });
    this.engineGain=eg;
    const len=this.ctx.sampleRate, buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const dd=buf.getChannelData(0);
    for (let i=0;i<len;i++) dd[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const bp=this.ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=2.2;
    const sg=this.ctx.createGain(); sg.gain.value=0;
    src.connect(bp); bp.connect(sg); sg.connect(master); src.start();
    this.screechGain=sg;
    // police siren: wailing tone, silent until a chase starts
    const so=this.ctx.createOscillator(); so.type="triangle"; so.frequency.value=700;
    const lfo=this.ctx.createOscillator(); lfo.type="sine"; lfo.frequency.value=1.6;
    const lg=this.ctx.createGain(); lg.gain.value=220;
    lfo.connect(lg); lg.connect(so.frequency);
    const sog=this.ctx.createGain(); sog.gain.value=0;
    so.connect(sog); sog.connect(master);
    so.start(); lfo.start();
    this.sirenGain=sog;
  },
  siren(on){ if (this.ctx) this.sirenGain.gain.setTargetAtTime(on?.09:0,this.ctx.currentTime,.2); },
  set(sp,drift,rpm){
    if (!this.ctx) return;
    const t=this.ctx.currentTime;
    // rpm rises through each gear then drops on the shift — real gearbox sound
    const f=48+(rpm!==undefined?rpm:sp)*150+sp*30;
    this.engineOsc.forEach(o=>o.frequency.setTargetAtTime(f,t,.06));
    this.engineGain.gain.setTargetAtTime(.04+sp*.08,t,.1);
    this.screechGain.gain.setTargetAtTime(drift?.16:0,t,drift?.05:.15);
  },
  blip(f,d=.12,ty="square",v=.22){
    if (!this.ctx) return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=ty; o.frequency.value=f;
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.001,t+d);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+d);
  },
  coin(){ this.blip(920,.08); this.blip(1380,.14); },
  bank(){ this.blip(520,.1); this.blip(660,.12); this.blip(880,.2); },
  crash(){
    if (!this.ctx) return;
    const t=this.ctx.currentTime,sr=this.ctx.sampleRate;
    const b=this.ctx.createBuffer(1,sr*.3,sr),d=b.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s=this.ctx.createBufferSource(); s.buffer=b;
    const g=this.ctx.createGain(); g.gain.value=.5;
    s.connect(g); g.connect(this.master); s.start(t);
    this.blip(70,.4,"sawtooth",.4);
  },
  music(){
    const bass=[0,0,5,3], arp=[0,7,12,15,12,7], root=55, bpm=100, beat=60/bpm;
    let bar=0;
    const tick=()=>{
      if (!this.ctx) return;
      const t0=this.ctx.currentTime+.05, s=bass[bar%4];
      for (let b=0;b<4;b++){
        const t=t0+b*beat;
        const o=this.ctx.createOscillator(),g=this.ctx.createGain();
        o.type="triangle"; o.frequency.value=root*Math.pow(2,s/12);
        g.gain.setValueAtTime(.16,t); g.gain.exponentialRampToValueAtTime(.001,t+beat*.9);
        o.connect(g); g.connect(this.master); o.start(t); o.stop(t+beat);
        for (let a=0;a<2;a++){
          const ta=t+a*beat/2, idx=(bar*8+b*2+a)%arp.length;
          const o2=this.ctx.createOscillator(),g2=this.ctx.createGain();
          o2.type="square"; o2.frequency.value=root*4*Math.pow(2,(s+arp[idx])/12);
          g2.gain.setValueAtTime(.035,ta); g2.gain.exponentialRampToValueAtTime(.001,ta+beat*.4);
          o2.connect(g2); g2.connect(this.master); o2.start(ta); o2.stop(ta+beat/2);
        }
      }
      bar++; setTimeout(tick,beat*4*1000-60);
    };
    tick();
  }
};

/* surface model: full grip on asphalt, loose dirt between the blocks */
function surfaceGrip(x,z){
  const nx=((x%GRID)+GRID)%GRID, nz=((z%GRID)+GRID)%GRID;
  const onRoad=Math.min(nx,GRID-nx)<ROAD_HALF+1.6 || Math.min(nz,GRID-nz)<ROAD_HALF+1.6;
  return onRoad?1:.55;
}
function loseCombo(msg){
  shakeT=.45;
  if (score.pending>0){ score.pending=0; score.mult=1; score.driftT=0;
    flash(msg,"#ff4d4d"); Audio2.crash(); }
}

function physics(dt,now){
  const target=(input.right?1:0)-(input.left?1:0);
  input.steer=THREE.MathUtils.damp(input.steer,target,target===0?14:8,dt);
  const fwd=new THREE.Vector3(Math.sin(S.yaw),0,Math.cos(S.yaw));
  const right=new THREE.Vector3(fwd.z,0,-fwd.x);
  const speed=S.vel.length();
  S.slip=S.vel.dot(fwd)>2?THREE.MathUtils.radToDeg(
    Math.atan2(S.vel.dot(right),Math.max(S.vel.dot(fwd),.001))):0;
  const absSlip=Math.abs(S.slip);
  // auto-drift: hold steer hard at speed for a moment and the rear kicks out
  S.steerHold=(Math.abs(input.steer)>.85&&speed>11)?(S.steerHold||0)+dt:0;
  const wantSlide=input.hb||S.steerHold>.22;
  if (!S.drifting && (absSlip>P.enterDeg||(wantSlide&&speed>8))) S.drifting=true;
  else if (S.drifting && absSlip<P.exitDeg && !wantSlide) S.drifting=false;

  // ---- drive: realistic engine model ----
  const fSpeed=S.vel.dot(fwd);                       // signed forward speed
  const nitroOn=input.nitro&&S.nitro>0&&input.gas; S.nitroOn=nitroOn;
  if (nitroOn){ S.nitro=Math.max(0,S.nitro-30*dt); }
  const cap=P.maxSpeed*(nitroOn?1.45:1);
  // 5-speed gearbox: rpm rises within each gear, drops on shift
  const seg=P.maxSpeed/5;
  S.gear=Math.min(5,1+Math.max(0,fSpeed)/seg|0);
  S.rpm=Math.min(1,(Math.max(0,fSpeed)-(S.gear-1)*seg)/seg);
  // surface: dirt between blocks is slower, slipperier, and bumpy
  const surf=surfaceGrip(S.pos.x,S.pos.z);
  const wasOff=S.offroad; S.offroad=surf<1;
  // burnout: launching hard from a standstill spins the rear tires
  S.burnout=input.gas&&!input.brake&&fSpeed>=0&&fSpeed<5&&surf===1;
  if (input.gas){
    // power curve: strong low-end, tapers near top speed
    const curve=Math.max(0,1-Math.max(fSpeed,0)/cap);
    // traction circle: sideways-sliding tires can't also push forward hard
    let traction=1-.55*Math.min(1,absSlip/45);
    if (S.burnout) traction*=.8;                    // wheelspin wastes power
    const acc=(nitroOn?P.boostAccel*1.3:P.accel)*(.35+.65*curve)*traction*(S.offroad?.7:1);
    S.vel.addScaledVector(fwd,acc*dt);
    if (S.burnout){
      S.yaw+=(Math.random()-.5)*.9*dt;              // rear end squirms
      S.rpm=Math.max(S.rpm,.85);
    }
  }
  if (input.brake){
    // braking force is grip-limited: much weaker on dirt
    if (fSpeed>1.5) S.vel.addScaledVector(fwd,-24*Math.min(1,surf+.15)*dt);
    else if (fSpeed>-8) S.vel.addScaledVector(fwd,-7*dt);       // reverse
  }
  // physics-based losses: aero drag (v²) + rolling resistance + engine braking
  const v=S.vel.length();
  if (v>.02){
    let decel=.010*v*v+.35;
    if (!input.gas&&!input.brake) decel+=1.4;      // engine braking on lift-off
    S.vel.addScaledVector(S.vel.clone().divideScalar(v),-Math.min(decel*dt,v));
  }
  // drifting charges nitro
  if (S.drifting&&speed*3.6>25) S.nitro=Math.min(100,S.nitro+11*dt);

  // speed-sensitive steering: full lock at low speed, heavier at highway speed
  const sf=THREE.MathUtils.clamp(speed/10,0,1)/(1+Math.max(0,speed-18)*.03);
  let yawRate=input.steer*P.steerRate*(S.drifting?P.driftSteerBonus*P.oversteer:1)*sf;
  if (S.drifting) yawRate-=THREE.MathUtils.degToRad(S.slip)*P.assist*.5;
  S.yaw-=yawRate*dt;

  // grip: downforce adds bite at speed; dirt takes it away
  let grip=S.drifting?P.gripDrift:P.gripNormal*(1+P.df*speed);
  grip*=surf;
  if (input.hb||S.steerHold>.22) grip*=P.hbKick;
  const lat=right.clone().multiplyScalar(S.vel.dot(right));
  S.vel.addScaledVector(lat,-grip*dt);
  if (S.drifting) S.vel.addScaledVector(fwd,lat.length()*.35*dt);
  S.vel.multiplyScalar(1-.25*dt);
  S.pos.addScaledVector(S.vel,dt);
  S.pos.x=THREE.MathUtils.clamp(S.pos.x,-WORLD*.92,WORLD*.92);
  S.pos.z=THREE.MathUtils.clamp(S.pos.z,-WORLD*.92,WORLD*.92);

  // static collisions (buildings + parked cars share the AABB list)
  for (const b of buildings){
    const dx=S.pos.x-b.x, dz=S.pos.z-b.z;
    if (Math.abs(dx)<b.hw+1 && Math.abs(dz)<b.hd+2){
      // real collision response: bounce off the wall normal, keep sliding along it
      if (b.hw+1-Math.abs(dx)<b.hd+2-Math.abs(dz)){
        S.pos.x=b.x+Math.sign(dx)*(b.hw+1);
        S.vel.x*=-.28; S.vel.z*=.82;
      } else {
        S.pos.z=b.z+Math.sign(dz)*(b.hd+2);
        S.vel.z*=-.28; S.vel.x*=.82;
      }
      loseCombo("CRASHED — COMBO LOST");
    }
  }
  // moving traffic: update + collide
  for (const t of traffic){
    t.u+=t.dir*t.speed*dt;
    if (t.u>WORLD) t.u=-WORLD; if (t.u<-WORLD) t.u=WORLD;
    const px=t.onX?t.u:t.line*GRID+t.lane;
    const pz=t.onX?t.line*GRID+t.lane:t.u;
    t.mesh.position.set(px,0,pz);
    t.mesh.rotation.y=t.onX?(t.dir>0?-Math.PI/2:Math.PI/2):(t.dir>0?Math.PI:0);
    const dx=S.pos.x-px, dz=S.pos.z-pz;
    if (Math.abs(dx)<3 && Math.abs(dz)<3){
      const push=new THREE.Vector3(dx,0,dz).normalize();
      S.pos.addScaledVector(push,.6);
      S.vel.multiplyScalar(.4);
      loseCombo("TRAFFIC HIT — COMBO LOST");
    } else {
      // near-miss bonus: skim past traffic at speed without touching it
      if (t.nearCd>0) t.nearCd-=dt;
      const d2=dx*dx+dz*dz;
      if (d2<30 && speed>14 && (t.nearCd===undefined||t.nearCd<=0)){
        t.nearCd=3;
        if (S.drifting) score.pending+=150;
        else { score.banked+=150; earn(15); }
        missionEvent("near",1); bumpStat("near",1);
        flash("NEAR MISS +150","#00e5ff"); Audio2.blip(660,.12);
      }
    }
  }
  // scoring
  const kmh=speed*3.6;
  if (S.drifting && kmh>25){
    score.driftT+=dt; score.sinceEnd=0;
    const aF=THREE.MathUtils.clamp((absSlip-8)/32,0,1);
    const sF=THREE.MathUtils.clamp((kmh-25)/100,0,1);
    score.mult=Math.min(5,1+(score.driftT/2|0));
    score.pending+=120*aF*(.4+sF)*score.mult*dt;
    if ((frameCount&1)===0) dropSkid(S.pos.x,S.pos.z,S.yaw);
    if ((frameCount%4)===0)
      for (const s of [-.95,.95]){
        const off=new THREE.Vector3(s,0,-1.45).applyAxisAngle(new THREE.Vector3(0,1,0),S.yaw);
        emitSmoke(S.pos.clone().add(off).setY(.3),
          new THREE.Vector3((Math.random()-.5)*2,1.6,(Math.random()-.5)*2));
      }
  } else if (score.pending>0){
    score.sinceEnd+=dt;
    if (score.sinceEnd>1.5){
      score.banked+=score.pending|0;
      earn(score.pending/10);
      bumpStat("banked",score.pending|0);
      missionEvent("bank",score.pending|0);
      flash(`+${score.pending|0} BANKED · ¤${score.pending/10|0}`,"#7cfc9a"); Audio2.bank();
      score.pending=0; score.mult=1; score.driftT=0;
      if (score.banked>score.best){ score.best=score.banked; localStorage.ndBest=score.best; }
    }
  }
  for (const c of coins){
    if (!c.visible){
      // coins respawn 30s after pickup so the map never runs dry
      if (c.userData.respawn && now>c.userData.respawn){ c.visible=true; c.userData.respawn=0; }
      continue;
    }
    c.rotation.y+=3*dt;
    if (c.position.distanceToSquared(S.pos)<9){
      c.visible=false; c.userData.respawn=now+30000;
      score.banked+=250; earn(50);
      missionEvent("coin",1); bumpStat("coins",1);
      Audio2.coin(); flash("+250 · ¤50","#ffd23f");
      if (score.banked>score.best){ score.best=score.banked; localStorage.ndBest=score.best; }
    }
  }
  car.position.copy(S.pos); car.rotation.y=S.yaw;
  car.rotation.z=THREE.MathUtils.damp(car.rotation.z,THREE.MathUtils.degToRad(S.slip)*.16,6,dt);
  // weight transfer: nose dips under braking, lifts under acceleration
  const longAcc=(fSpeed-(S.prevF||0))/Math.max(dt,.001); S.prevF=fSpeed;
  S.pitch=THREE.MathUtils.damp(S.pitch||0,THREE.MathUtils.clamp(longAcc*.004,-.06,.06),5,dt);
  car.rotation.x=S.pitch;
  // suspension: body bobs over curbs and rough dirt (spring-damper)
  if (wasOff!==S.offroad) S.vy=(S.vy||0)+1.1;
  if (S.offroad&&speed>4) S.vy+=(Math.random()-.5)*speed*.06;
  S.vy=(S.vy||0)+(-170*(S.sy||0)-13*(S.vy||0))*dt;
  S.sy=(S.sy||0)+S.vy*dt;
  car.position.y+=THREE.MathUtils.clamp(S.sy,-.06,.14);
  // burnout smoke + rubber laid at the rear wheels
  if (S.burnout&&(frameCount%2)===0){
    dropSkid(S.pos.x,S.pos.z,S.yaw);
    for (const s of [-.95,.95]){
      const off=new THREE.Vector3(s,0,-1.45).applyAxisAngle(new THREE.Vector3(0,1,0),S.yaw);
      emitSmoke(S.pos.clone().add(off).setY(.3),
        new THREE.Vector3((Math.random()-.5)*3,1.8,(Math.random()-.5)*3),0xcfcfd8,.7,1.2);
    }
  }
  // dust kicked up on dirt
  if (S.offroad&&speed>8&&(frameCount%3)===0)
    emitSmoke(S.pos.clone().add(new THREE.Vector3((Math.random()-.5)*1.5,.25,0)),
      new THREE.Vector3((Math.random()-.5)*2,1.2,(Math.random()-.5)*2),0x6b5a42,.8,1.4);
  car.userData.wheels.forEach((w,i)=>{
    w.children.forEach(ch=>ch.rotation.x-=fSpeed*dt*2.2);
    if (i<2) w.rotation.y=-input.steer*.42;
  });
  // brake lights glow when braking or handbraking
  car.userData.tail.material.color.setHex((input.brake||input.hb)?0xff2222:0x881010);
  // nitro flames from the rear
  if (nitroOn&&(frameCount%2)===0)
    for (const s of [-.5,.5]){
      const off=new THREE.Vector3(s,0,-2.3).applyAxisAngle(new THREE.Vector3(0,1,0),S.yaw);
      emitSmoke(S.pos.clone().add(off).setY(.55),
        new THREE.Vector3((Math.random()-.5)*1.5,.6,0),
        Math.random()<.5?0xff8822:0x7744ff,.35,.55);
    }
  Audio2.set(speed/P.maxSpeed, S.drifting&&kmh>25, S.rpm);
}

function updateHUD(dt){

  const w=208, sc=w/(WORLD*2);

  mm.strokeStyle="rgba(160,170,220,.5)"; mm.lineWidth=2;

    mm.beginPath(); mm.moveTo(0,p); mm.lineTo(w,p); mm.stroke();
    mm.beginPath(); mm.moveTo(p,0); mm.lineTo(p,w); mm.stroke();
  }
  mm.fillStyle="#ffd23f";
  for (const c of coins){ if (!c.visible) continue;
    mm.fillRect((c.position.x+WORLD)*sc-1.5,(c.position.z+WORLD)*sc-1.5,3,3); }

  if (race.active){

    mm.fillStyle="#35ffa0";
    mm.beginPath(); mm.arc((p.x+WORLD)*sc,(p.z+WORLD)*sc,4,0,7); mm.fill();
    mm.fillStyle="#ff8833";
    for (const r of rivals)
      mm.fillRect((r.mesh.position.x+WORLD)*sc-2,(r.mesh.position.z+WORLD)*sc-2,4,4);
  }
  if (police.active){
    mm.fillStyle="#4488ff";
    for (const c of police.cops)
      mm.fillRect((c.mesh.position.x+WORLD)*sc-2,(c.mesh.position.z+WORLD)*sc-2,4,4);
  }
  const px=(S.pos.x+WORLD)*sc, pz=(S.pos.z+WORLD)*sc;
  mm.save(); mm.translate(px,pz); mm.rotate(-S.yaw);
  mm.fillStyle="#00e5ff";
  mm.beginPath(); mm.moveTo(0,-6); mm.lineTo(4,5); mm.lineTo(-4,5); mm.closePath(); mm.fill();
  mm.restore();
}

const police={ active:false, cops:[], hits:0, t:0, escapeT:0,

function makeCop(){
  const g=new THREE.Group();
  const b=new THREE.Mesh(new THREE.BoxGeometry(2,.85,4.4),
    new THREE.MeshStandardMaterial({ color:0x0a0a12, metalness:.6, roughness:.4 }));
  b.position.y=.55; b.castShadow=true; g.add(b);

  c.position.y=1.12; g.add(c);
  const red=new THREE.Mesh(new THREE.BoxGeometry(.5,.16,.3),
    new THREE.MeshBasicMaterial({ color:0xff2222 }));
  red.position.set(-.3,1.5,0); g.add(red);
  const blue=new THREE.Mesh(new THREE.BoxGeometry(.5,.16,.3),
    new THREE.MeshBasicMaterial({ color:0x2266ff }));
  blue.position.set(.3,1.5,0); g.add(blue);
  const hl=new THREE.Mesh(new THREE.BoxGeometry(1.7,.13,.06),
    new THREE.MeshBasicMaterial({ color:0xfff4cc })); hl.position.set(0,.6,2.2); g.add(hl);
  scene.add(g);
  return { mesh:g, yaw:0, red, blue, hitCd:0 };
}
function startPolice(){
  police.active=true; police.hits=0; police.t=0; police.escapeT=0;
  police.cops=[makeCop(),makeCop()];
  police.cops.forEach((c,i)=>{
    c.mesh.position.set(S.pos.x+(i?-14:14), 0, S.pos.z+18);
    c.yaw=S.yaw;
  });
  Audio2.siren(true);
  $("police").classList.remove("hidden");
  flash("🚨 POLICE! ESCAPE THEM!","#4488ff");
}
function endPolice(outcome){
  police.active=false;
  Audio2.siren(false);
  $("police").classList.add("hidden");
  for (const c of police.cops){ scene.remove(c.mesh);
    c.mesh.traverse(o=>{ if(o.geometry) o.geometry.dispose(); }); }
  police.cops=[];
  police.nextAt=race.active?30:60+Math.random()*60;
  if (outcome==="escaped"){ earn(400); flash("ESCAPED! · ¤400","#7cfc9a"); Audio2.bank(); }
  else if (outcome==="gaveup"){ earn(200); flash("THEY GAVE UP · ¤200","#7cfc9a"); }
  else if (outcome==="busted"){
    const fine=Math.min(wallet,200);
    wallet-=fine; saveEconomy(); renderWallet();
    loseCombo(`BUSTED! FINE ¤${fine}`);
  }
}
function updatePolice(dt,now){
  if (!police.active){
    if (mode==="play"&&!race.active){
      police.nextAt-=dt;
      if (police.nextAt<=0) startPolice();
    }
    return;
  }
  police.t+=dt;
  let nearest=1e9;
  // cops try to ram you; they scale with your top speed so upgrades matter
  const copSpeed=P.maxSpeed*.85;
  for (const c of police.cops){
    const dx=S.pos.x-c.mesh.position.x, dz=S.pos.z-c.mesh.position.z;
    const d=Math.hypot(dx,dz); nearest=Math.min(nearest,d);
    const targetYaw=Math.atan2(dx,dz);
    let dy=targetYaw-c.yaw; dy=Math.atan2(Math.sin(dy),Math.cos(dy));
    c.yaw+=THREE.MathUtils.clamp(dy,-2.2*dt,2.2*dt);
    c.mesh.position.x+=Math.sin(c.yaw)*copSpeed*dt;
    c.mesh.position.z+=Math.cos(c.yaw)*copSpeed*dt;
    c.mesh.rotation.y=c.yaw;
    // flashing light bar
    const ph=(now*.008|0)%2;
    c.red.visible=ph===0; c.blue.visible=ph===1;
    if (c.hitCd>0) c.hitCd-=dt;
    if (d<3.2&&c.hitCd<=0){
      c.hitCd=1.2; police.hits++;
      const push=new THREE.Vector3(dx,0,dz).normalize();
      S.pos.addScaledVector(push,1.2); S.vel.multiplyScalar(.5);
      shakeT=.5; Audio2.crash();
      if (police.hits>=3){ endPolice("busted"); return; }
      flash(`RAMMED ${police.hits}/3!`,"#ff4d4d");
    }
  }
  if (nearest>70) police.escapeT+=dt; else police.escapeT=0;
  if (police.escapeT>4){ endPolice("escaped"); return; }
  if (police.t>50){ endPolice("gaveup"); return; }
  $("police").textContent=`🚨 ${police.hits}/3 hits · ${nearest>70?"LOSING THEM…":"THEY'RE ON YOU"} · ${(50-police.t)|0}s`;
}

/* ---- AI rivals: race you through the same checkpoints ---- */
const rivals=[];
function makeRival(color){
  const g=new THREE.Group();
  const mt=new THREE.MeshStandardMaterial({ color, metalness:.7, roughness:.3 });
  const b=new THREE.Mesh(new THREE.BoxGeometry(2,.85,4.3),mt);
  b.position.y=.55; b.castShadow=true; g.add(b);
  const c=new THREE.Mesh(new THREE.BoxGeometry(1.7,.55,2),
    new THREE.MeshStandardMaterial({ color:0x0c0c14, metalness:.8, roughness:.2 }));
  c.position.y=1.12; g.add(c);
  const hl=new THREE.Mesh(new THREE.BoxGeometry(1.7,.13,.06),
    new THREE.MeshBasicMaterial({ color:0xfff4cc })); hl.position.set(0,.6,2.18); g.add(hl);
  const tl=new THREE.Mesh(new THREE.BoxGeometry(1.7,.13,.06),
    new THREE.MeshBasicMaterial({ color:0xff2222 })); tl.position.set(0,.6,-2.18); g.add(tl);
  scene.add(g);
  return { mesh:g, idx:0, yaw:0, done:0, speed:0 };
}
function spawnRivals(){
  clearRivals();
  const cols=[0xff3355,0x33ff88];
  for (let i=0;i<2;i++){
    const r=makeRival(cols[i]);
    r.mesh.position.set(S.pos.x+(i?-4:4), 0, S.pos.z-4);
    r.yaw=S.yaw;
    // rival pace scales with level; slight difference between the two
    r.speed=13+race.level*1.1+i*.8+Math.random();
    rivals.push(r);
  }
}
function clearRivals(){
  for (const r of rivals){ scene.remove(r.mesh);
    r.mesh.traverse(o=>{ if(o.geometry) o.geometry.dispose(); }); }
  rivals.length=0;
}
function updateRivals(dt){
  for (const r of rivals){
    if (r.done) continue;
    const p=race.pts[r.idx];
    const dx=p.x-r.mesh.position.x, dz=p.z-r.mesh.position.z;
    if (Math.hypot(dx,dz)<8){
      r.idx++;
      if (r.idx>=race.pts.length){ r.done=race.t; continue; }
    }
    const targetYaw=Math.atan2(dx,dz);
    let dy=targetYaw-r.yaw; dy=Math.atan2(Math.sin(dy),Math.cos(dy));
    r.yaw+=THREE.MathUtils.clamp(dy,-2*dt,2*dt);
    // rubber-band: leader eases off, trailer pushes harder
    const pace=r.idx>race.idx ? r.speed*.88 : r.speed*1.06;
    r.mesh.position.x+=Math.sin(r.yaw)*pace*dt;
    r.mesh.position.z+=Math.cos(r.yaw)*pace*dt;
    r.mesh.rotation.y=r.yaw;
  }
}
function playerPlace(){
  let ahead=0;
  for (const r of rivals)
    if (r.done || r.idx>race.idx) ahead++;
  return 1+ahead;
}
function raceGoal(){ return 4+race.level; }          // checkpoints this level
function raceTimeLimit(){ return raceGoal()*14-race.level*1.5; } // seconds, gets tighter
function startRace(){
  race.pts=[];
  const used=new Set();
  while (race.pts.length<raceGoal()){
    const gx=((Math.random()*7)|0)-3, gz=((Math.random()*7)|0)-3;
    const k=gx+","+gz;
    if (used.has(k)) continue;
    used.add(k); race.pts.push({ x:gx*GRID, z:gz*GRID });
  }
  race.idx=0; race.t=0; race.active=true;
  spawnRivals();
  beam.visible=true;
  beam.position.set(race.pts[0].x,30,race.pts[0].z);
  $("race").classList.remove("hidden");
  flash(`LEVEL ${race.level} — ${raceGoal()} BEAMS IN ${raceTimeLimit()|0}s!`,"#35ffa0");
}
function endRace(finished){
  race.active=false; beam.visible=false;
  const place=playerPlace();
  clearRivals();
  $("race").classList.add("hidden");
  if (finished){
    let reward=300+race.level*200+Math.max(0,(raceTimeLimit()-race.t)*15)|0;
    if (place===1) reward+=300;
    earn(reward);
    flash(place===1?`🥇 P1! LEVEL ${race.level} CLEAR · ¤${reward}`
                   :`LEVEL ${race.level} CLEAR (P${place}) · ¤${reward}`,"#35ffa0");
    Audio2.bank();
    race.level++; localStorage.ndRaceLvl=race.level;
    bumpStat("missions",1);
  } else {
    flash("TIME'S UP — RACE FAILED","#ff4d4d"); Audio2.crash();
  }
}
function updateRace(dt){
  if (!race.active) return;
  race.t+=dt;
  if (race.t>raceTimeLimit()){ endRace(false); return; }
  const p=race.pts[race.idx];
  const d=Math.hypot(S.pos.x-p.x,S.pos.z-p.z);
  if (d<7){
    race.idx++;
    Audio2.blip(700+race.idx*60,.15,"square",.3);
    if (race.idx>=race.pts.length){ endRace(true); return; }
    const n=race.pts[race.idx];
    beam.position.set(n.x,30,n.z);
    flash(`CHECKPOINT ${race.idx}/${raceGoal()}`,"#35ffa0");
  }
  updateRivals(dt);
  beam.rotation.y+=dt;
  beam.material.opacity=.25+.12*Math.sin(race.t*5);
  const left=raceTimeLimit()-race.t;
  $("race").textContent=`🏁 LV${race.level} · P${playerPlace()}/3 · ${race.idx}/${raceGoal()} · ${left.toFixed(1)}s left`;
  $("race").style.color=left<8?"#ff4d4d":"#ffd23f";
}

    const fwd=new THREE.Vector3(Math.sin(S.yaw),0,Math.cos(S.yaw));
    const chase=car.position.clone().addScaledVector(fwd,-8.2).add(new THREE.Vector3(0,3.4,0));
    camLook.copy(car.position).addScaledVector(fwd,4).add(new THREE.Vector3(0,1,0));
    if (mode==="transition"){
      transT+=dt/1.4;
      camera.position.lerp(chase,THREE.MathUtils.smoothstep(transT,0,1)*.15+.02);
      if (transT>=1){ mode="play"; $("hud").classList.remove("hidden");
        if (raceQueued){ raceQueued=false; startRace(); } }
    } else {
      camera.position.lerp(chase,1-Math.exp(-5*dt));
      if (shakeT>0){ shakeT-=dt;
        camera.position.x+=(Math.random()-.5)*shakeT*1.6;
        camera.position.y+=(Math.random()-.5)*shakeT*1.2; }
      if (S.offroad&&S.vel.length()>6){   // dirt rumble
        camera.position.x+=(Math.random()-.5)*.06;
        camera.position.y+=(Math.random()-.5)*.05; }
      const fovT=60+S.vel.length()*.55+(S.drifting?4:0)+(S.nitroOn?9:0);
      camera.fov+=(fovT-camera.fov)*Math.min(1,6*dt);
      camera.updateProjectionMatrix();
    }
  }
  camera.lookAt(camLook);
}

/* ================= BOOT + LOOP ================= */
buildWorld(MAPS[mapIdx]);
renderWallet(); renderUpgrades(); renderCars(); renderProfile();
$("loading").classList.add("hidden");
$("garage").classList.remove("hidden");

let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  frameCount++;
  if (mode!=="menu") physics(dt,now);
  else {
    // traffic keeps flowing in the garage background for life
    for (const t of traffic){
      t.u+=t.dir*t.speed*dt;
      if (t.u>WORLD) t.u=-WORLD; if (t.u<-WORLD) t.u=WORLD;
      const px=t.onX?t.u:t.line*GRID+t.lane, pz=t.onX?t.line*GRID+t.lane:t.u;
      t.mesh.position.set(px,0,pz);
      t.mesh.rotation.y=t.onX?(t.dir>0?-Math.PI/2:Math.PI/2):(t.dir>0?Math.PI:0);
    }
  }
  if (mode==="play"){ updateHUD(dt); updateRace(dt); updatePolice(dt,now); }
  // animate rain around the car
  const rain=world&&world.userData.rain;
  if (rain){
    rain.position.set(car.position.x,0,car.position.z);
    const a=rain.geometry.attributes.position;
    for (let i=0;i<a.count;i++){
      let y=a.getY(i)-38*dt;
      if (y<0) y=45;
      a.setY(i,y);
    }
    a.needsUpdate=true;
  }
  updateSmoke(dt);
  updateCamera(dt);
  moonLight.position.set(car.position.x-60,90,car.position.z-40);
  if (fxOn){
    bloom.strength=.75+(S.nitroOn?.35:0)+(S.drifting?.12:0);  // glow pulses with action
    const sp01=Math.min(1,S.vel.length()/P.maxSpeed);
    CinePass.uniforms.uBlur.value=(mode==="play")?(sp01*sp01*.5+(S.nitroOn?.6:0)):0;
    CinePass.uniforms.uTime.value=now*.001%10;
    composer.render();
  } else renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
camera.position.set(6,2.8,7);
requestAnimationFrame(loop);
</script>
